name: release

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      msg_check: ${{ steps.check-msg.outputs.match }}
      tag: ${{ steps.check-msg.outputs.tag }}
    steps:
      - name: Check Message
        id: check-msg
        run: |
          pattern="^Release v[0-9]+.[0-9]+.[0-9]+ #(minor|major|patch)$"
          if [[ "${{ github.event.head_commit.message }}" =~ ${pattern} ]]; then
              echo match=true >> "$GITHUB_OUTPUT"
              echo "tag=$(printf '%s' '${{ github.event.head_commit.message }}' | sed -E 's/^Release (v[0-9]+\.[0-9]+\.[0-9]+) #(minor|major|patch)$/\1/')" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    runs-on: ubuntu-latest
    if: needs.check-commit.outputs.msg_check == 'true'
    needs: check-commit
    permissions:
      contents: write
    outputs:
      new_tag: ${{ needs.check-commit.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          tag="${{ needs.check-commit.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tagged_sha="$(git rev-list -n 1 "$tag")"
            if [ "$tagged_sha" != "${{ github.sha }}" ]; then
              echo "Tag $tag already exists at $tagged_sha, not ${{ github.sha }}" >&2
              exit 1
            fi
            exit 0
          fi
          git tag "$tag" "${{ github.sha }}"
          git push origin "$tag"

  goreleaser:
    runs-on: ubuntu-latest
    needs: create-tag
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.new_tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: false

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear
        if: always()
        run: rm -f "${HOME}/.docker/config.json"
