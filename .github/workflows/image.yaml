name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: goreleaser
    uses: vultr/shared-actions/.github/workflows/go-releaser.yml@main
    with:
      go_version: "1.26.0"
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      docker_user: ${{ secrets.DOCKER_USERNAME }}
      docker_pass: ${{ secrets.DOCKER_PASSWORD }}
