{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-autoheal.fullname" . }}
  labels:
    {{- include "cluster-autoheal.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - policy
    resources:
      - pods/eviction
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster-autoheal.fullname" . }}
  labels:
    {{- include "cluster-autoheal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cluster-autoheal.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cluster-autoheal.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
