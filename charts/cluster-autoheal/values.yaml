replicaCount: 2

image:
  repository: ghcr.io/vultr/cluster-autoheal
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

controller:
  cloudProvider: vultr
  actionOverrideLabel: cluster-autoheal.vultr.com/repair-action
  leaderElect: true
  leaderElectionNamespace: kube-system
  leaderElectionName: cluster-autoheal
  scanInterval: 30s
  drainTimeout: 10m
  rebootReadyTimeout: 15m
  healthAddr: :8080
  cordonBeforeRepair: true
  drainBeforeRepair: false
  uncordonAfterReboot: true
  deleteEmptyDirData: false
  dryRun: false
  logVerbosity: 2

repairPolicy:
  enabled: true
  maxUnhealthyNodeThresholdPercentage: 20
  maxParallelNodesRepairedCount: 1
  rules:
    - condition: AcceleratedHardwareReady
      minRepairWait: 10m
      action: reboot
    - condition: ContainerRuntimeReady
      minRepairWait: 30m
      action: replace
    - condition: KernelReady
      minRepairWait: 30m
      action: replace
    - condition: NetworkingReady
      minRepairWait: 30m
      action: replace
    - condition: StorageReady
      minRepairWait: 30m
      action: replace
    - condition: Ready
      minRepairWait: 30m
      action: replace

vultr:
  apiKey: ""
  existingSecret: ""
  apiKeySecretKey: api-key

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}
dnsPolicy: Default

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: ""

pdb:
  enabled: false
  minAvailable: 0

networkPolicy:
  enabled: false
  ingress: []
  egress: []
