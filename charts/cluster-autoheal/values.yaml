replicaCount: 1

image:
  repository: ghcr.io/vultr/cluster-autoheal
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

controller:
  cloudProvider: vultr
  repairAction: reboot
  scanInterval: 30s
  unhealthyDuration: 10m
  drainTimeout: 10m
  rebootReadyTimeout: 15m
  healthAddr: :8080
  cordonBeforeRepair: true
  drainBeforeRepair: false
  uncordonAfterReboot: true
  deleteEmptyDirData: false
  dryRun: false
  logVerbosity: 2

vultr:
  apiKey: ""
  existingSecret: ""
  apiKeySecretKey: api-key

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: ""

pdb:
  enabled: false
  minAvailable: 0

networkPolicy:
  enabled: false
  ingress: []
  egress: []
